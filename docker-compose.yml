services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auditasec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auditasec_secret}
      POSTGRES_DB: ${POSTGRES_DB:-auditasecifc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auditasec} -d ${POSTGRES_DB:-auditasecifc}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-auditasec}:${POSTGRES_PASSWORD:-auditasec_secret}@db:5432/${POSTGRES_DB:-auditasecifc}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
